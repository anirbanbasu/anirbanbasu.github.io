# The URL the site will be built for
base_url = "https://anirbanbasu.netlify.app"

# The site title and description; used in feeds by default.
title = "anirbanbasu"
description = "Website of Anirban Basu"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# When set to "true", a feed is automatically generated.
generate_feeds = true

# The default author for pages
author = "Anirban Basu"

# The taxonomies to be rendered for the site and their configuration of the default languages
# Example:
#     taxonomies = [
#       {name = "tags", feed = true}, # each tag will have its own feed
#       {name = "tags"}, # you can have taxonomies with the same name in multiple languages
#       {name = "categories", paginate_by = 5},  # 5 items per page for a term
#       {name = "authors"}, # Basic definition: no feed or pagination
#     ]
#
taxonomies = [
    { name = "tags", feed = true },
    { name = "categories", feed = true, paginate_by = 5 },
]

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

theme = "terminus"

[markdown]

# When set to "true", emoji aliases translated to their corresponding
# Unicode emoji equivalent in the rendered Markdown files. (e.g.: :smile: => 😄)
render_emoji = true

# Whether footnotes are rendered in the GitHub-style (at the bottom, with back references) or plain (in the place, where they are defined)
bottom_footnotes = true

# When set to "true", support for GitHub-style alerts, a.k.a. callouts or admonitions, is enabled in the Markdown parser.
github_alerts = true

[markdown.highlighting]
# Whether to use inline hex colours ("inline") or CSS classes ("class").
# See https://www.getzola.org/documentation/content/syntax-highlighting/ for details.
style = "inline"

# The theme to use for code highlighting.
# See https://github.com/getzola/giallo?tab=readme-ov-file#themes for the list of allowed values.
theme = "monokai"

[extra]
close_responsive_menu_on_resize = true
color_scheme = "one-dark"
color_scheme_switcher = false
favicon = "images/favicon.png"
# favicon_emoji = "👨‍💻"
# fediverse_creator = "@ebkalderon@hachyderm.io"
layout = "center"
show_default_author = false

# Customize the copyright text shown in the site footer using markdown.
#
# Strings delimited by `::` will be split into mobile-responsive HTML spans. If
# present, the placeholder values `$YEAR` and `$AUTHOR` are templated with the
# current year and the site author defined in your `config.toml`, respectively.
copyright = "© $YEAR $AUTHOR :: Powered by [Zola](https://www.getzola.org) :: Base theme by [ebkalderon](https://eyalkalderon.com)"

main_menu = [
    { name = "musings", url = "musings", trailing_slash = true },
    { name = "research", url = "research", trailing_slash = false },
    { name = "open-source projects", url = "projects", trailing_slash = true },
    { name = "photography [↗]", url = "https://perspectives.anirbanbasu.com", new_tab = true },
    { name = "et cetera", url = "et-cetera", trailing_slash = false },
]

socials = [
    { name = "github", url = "https://github.com/anirbanbasu" },
    { name= "instagram", url = "https://instagram.com/anirban_basu/" },
    { name = "linkedin", url = "https://www.linkedin.com/in/anirbanbasu" },
]

header_logo = "images/logo/logo.svg"
header_logo_width = "16vw"

[extra.content_security_policy]
enable = true
allowed_domains = [
    { directive = "base-uri", domains = ["'self'", "anirbanbasu.com", "anirbanbasu.netlify.app", "anirbanbasu.github.io"] },
    { directive = "connect-src", domains = ["'self'", "anirbanbasu.com", "anirbanbasu.netlify.app", "anirbanbasu.github.io"] },
    { directive = "form-action", domains = ["'self'", "anirbanbasu.com", "anirbanbasu.netlify.app", "anirbanbasu.github.io"] },
    { directive = "script-src", domains = ["'self'", "anirbanbasu.com", "anirbanbasu.netlify.app", "anirbanbasu.github.io"] },
]

[extra.responsive_images]
widths = [640, 784, 1280, 1920, 2560]
fallback_width = 1280
